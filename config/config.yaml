dataset:
  root: "dataset"
  data_yaml: "dataset/data.yaml"
  splits: ["train", "valid", "test"]
  num_classes: 30
  crops_dir: "dataset/crops"   # ViT training crops extracted from YOLO labels

yolo:
  weights: "yolo11n.pt"
  trained_weights: "runs/detect/runs/detect/train/weights/best.pt"
  epochs: 50
  imgsz: 640
  batch: 16
  device: "0"                  # GPU index; "cpu" fallback is automatic

vit:
  backbone: "google/vit-base-patch16-224"
  checkpoint: "runs/vit/best.pt"
  epochs: 20
  batch_size: 16
  lr: 1.0e-5
  weight_decay: 1.0e-4
  imgsz: 224
  num_workers: 0
  patience: 5                  # early stopping patience

web:
  host: "0.0.0.0"
  port: 8000
  confidence_threshold: 0.25

visualization:
  n_ims: 20
  rows: 5
  cmap: "rgb"
